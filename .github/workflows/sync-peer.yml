name: Sync peer GitHub Pages repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: peer-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Mirror this branch to the peer repository
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Check out site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve peer repository
        id: peer
        shell: bash
        run: |
          case "${GITHUB_REPOSITORY}" in
            economic-world-model/economic-world-model.github.io)
              echo "target=FreedomIntelligence/economic-world-model.github.io" >> "$GITHUB_OUTPUT"
              ;;
            FreedomIntelligence/economic-world-model.github.io)
              echo "target=economic-world-model/economic-world-model.github.io" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "No peer repository configured for ${GITHUB_REPOSITORY}."
              ;;
          esac

      - name: Push to peer
        if: ${{ steps.peer.outputs.target != '' }}
        env:
          PEER_DEPLOY_KEY: ${{ secrets.PEER_DEPLOY_KEY }}
          TARGET_REPOSITORY: ${{ steps.peer.outputs.target }}
        shell: bash
        run: |
          if [ -z "${PEER_DEPLOY_KEY}" ]; then
            echo "Missing PEER_DEPLOY_KEY. Skipping peer sync until the deploy key secret is configured."
            exit 0
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${PEER_DEPLOY_KEY}" > ~/.ssh/peer_deploy_key
          chmod 600 ~/.ssh/peer_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add peer "git@github.com:${TARGET_REPOSITORY}.git"

          remote_sha="$(GIT_SSH_COMMAND='ssh -i ~/.ssh/peer_deploy_key -o IdentitiesOnly=yes' git ls-remote peer refs/heads/main | awk '{print $1}')"
          local_sha="$(git rev-parse HEAD)"
          if [ "${remote_sha}" = "${local_sha}" ]; then
            echo "Peer already has ${local_sha}; nothing to sync."
            exit 0
          fi

          GIT_SSH_COMMAND='ssh -i ~/.ssh/peer_deploy_key -o IdentitiesOnly=yes' git push peer "HEAD:main" --force
